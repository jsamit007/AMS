# SonarCloud Configuration
# Replace 'your-organization-key' with your actual SonarCloud organization key

sonar.projectKey=AMS
sonar.organization=your-organization-key
sonar.projectName=Attendance Management System
sonar.projectVersion=1.0.0

# Sources to analyze
sonar.sources=AMS.API,AMS.Authentication,AMS.Command,AMS.Query,AMS.Repository,AMS.Contracts

# Exclusions
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/*.Tests/**

# Code Coverage (if using OpenCover)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Language and Encoding
sonar.language=cs
sonar.sourceEncoding=UTF-8

# .NET specific settings
sonar.cs.roslyn.ignoreIssues=false
